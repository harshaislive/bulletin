<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bewild - Storefront</title>
    <link rel="stylesheet" href="team.css" />
  </head>
  <body>
    <main class="slide">
      <div class="folio-top">
        <div class="team-label">Bewild</div>
        <div class="folio">03</div>
      </div>

      <section class="two-column">
        <div class="copy-block">
          <div class="copy-stack">
            <h2 class="headline">Clearer storefront, stronger products.</h2>
            <p class="subhead">Website revamp, 3 new products launched, and veggie bags restarted strongly (19/20 in first week).</p>
          </div>
        </div>

        <div class="mosaic-grid">
          <div class="wide-tile">
            <img src="../../Team Image Library/Bewild Images/bewild website 2.png" alt="Website" />
          </div>
          <div class="mosaic-side">
            <div class="tile">
              <img src="../../Team Image Library/Bewild Images/new products live on  bewild.png" alt="Products" />
            </div>
            <div class="tile">
              <img src="../../Team Image Library/Bewild Images/Veggie Bags.png" alt="Veggie Bags" />
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
