<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community Experience - Bhopal</title>
    <link rel="stylesheet" href="team.css" />
  </head>
  <body>
    <main class="slide">
      <div class="folio-top">
        <div class="team-label">Community Experience</div>
        <div class="folio">03</div>
      </div>

      <section class="two-column">
        <div class="copy-block">
          <div class="copy-stack">
            <h2 class="headline wide">Bhopal: Immersion in the landscape.</h2>
            <p class="subhead">Nature walks, vegetable harvesting, bush lunch, and camping - each experience building connection.</p>
          </div>
        </div>

        <div class="experience-band">
          <div class="wide-tile">
            <img src="../../Team Image Library/Community engagement/nature walk.png" alt="Nature walk" />
          </div>
          <div class="experience-side">
            <div class="tile">
              <img src="../../Team Image Library/Community engagement/Vegetable  harvesting.png" alt="Vegetable harvesting" />
            </div>
            <div class="tile">
              <img src="../../Team Image Library/Community engagement/Bush Lunch.png" alt="Bush Lunch" />
            </div>
            <div class="tile">
              <img src="../../Team Image Library/Community engagement/camping.png" alt="Camping" />
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
