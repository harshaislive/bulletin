<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospitality - Menu</title>
    <link rel="stylesheet" href="team.css" />
  </head>
  <body>
    <main class="slide">
      <div class="folio-top">
        <div class="team-label">Hospitality</div>
        <div class="folio">03</div>
      </div>

      <section class="two-column">
        <div class="copy-block">
          <div class="copy-stack">
            <h2 class="headline">Food as its own experience.</h2>
            <p class="subhead">New menu items and kombucha brought more character to the table.</p>
          </div>
        </div>

        <div class="mosaic-grid">
          <div class="tall-tile">
            <video src="../../Team Image Library/Hospitality Images/harvested broad beans .mp4" autoplay muted loop playsinline></video>
          </div>
          <div class="mosaic-side">
            <div class="tile">
              <img src="../../Team Image Library/Hospitality Images/Food.png" alt="Food" />
            </div>
            <div class="tile">
              <img src="../../Team Image Library/Hospitality Images/Kombucha drink.png" alt="Kombucha" />
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
