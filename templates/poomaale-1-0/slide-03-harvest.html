<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poomaale 1.0 - Harvest</title>
    <link rel="stylesheet" href="team.css" />
  </head>
  <body>
    <main class="slide">
      <div class="folio-top">
        <div class="team-label">Poomaale 1.0</div>
        <div class="folio">03</div>
      </div>

      <section class="two-column">
        <div class="copy-block">
          <div class="copy-stack">
            <h2 class="headline">Pepper and robusta harvest.</h2>
            <p class="subhead">124 kg of green pepper and 15,607 kg of robusta - strong output from the estate.</p>
          </div>
        </div>

        <div class="mosaic-grid">
          <div class="wide-tile">
            <video src="../../Team Image Library/Poomaale 1.0 collective Images/Robusta coffee picking.mp4" autoplay muted loop playsinline></video>
          </div>
          <div class="mosaic-side">
            <div class="tile">
              <img src="../../Team Image Library/Poomaale 1.0 collective Images/Pepper harvesting.png" alt="Pepper" />
            </div>
            <div class="tile">
              <img src="../../Team Image Library/Poomaale 1.0 collective Images/Wheel base soil filling.png" alt="Soil filling" />
            </div>
          </div>
        </div>
      </section>
    </main>
