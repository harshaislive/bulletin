<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bhopal Collective - Operations</title>
    <link rel="stylesheet" href="bhopal.css" />
  </head>
  <body>
    <main class="slide">
      <div class="folio-top">
        <div class="team-label">Bhopal / crop rhythm</div>
        <div class="folio">04</div>
      </div>

      <section class="closing-grid">
        <div class="filmstrip">
          <div class="wide-tile">
            <video src="../../Team Image Library/Bhopal Collective/Irrigation and harvesting.mp4" autoplay muted loop playsinline></video>
          </div>
          <div class="filmstack">
            <div class="tile">
              <video src="../../Team Image Library/Bhopal Collective/Thrashing of pigeon pea.mp4" autoplay muted loop playsinline></video>
            </div>
            <div class="tile">
              <img src="../../Team Image Library/Bhopal Collective/Irrigation in fields.png" alt="Irrigation in fields" />
            </div>
          </div>
        </div>

        <div class="copy-block">
          <div class="copy-stack">
            <p class="eyebrow">Working proof</p>
            <h1 class="headline wide">A place earns trust when the basics are done well.</h1>
            <p class="subhead">
              Underneath the visitor story was steady farm work: irrigation, harvest, and soil inputs that keep the collective credible.
            </p>
          </div>

          <div class="stat-block">
            <strong>10 acres</strong>
            <span>actively managed across pigeon pea, mustard, and two wheat varieties.</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
