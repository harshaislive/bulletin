<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bodakonda - Participation</title>
    <link rel="stylesheet" href="team.css" />
  </head>
  <body>
    <main class="slide">
      <div class="folio-top">
        <div class="team-label">Bodakonda Collective</div>
        <div class="folio">05</div>
      </div>

      <section class="two-column">
        <div class="copy-block">
          <div class="copy-stack">
            <h2 class="headline">Biodiversity and community.</h2>
            <p class="subhead">Flora planting, bio-inputs, and 2 volunteer sessions built participation into the landscape.</p>
          </div>
        </div>

        <div class="gallery-grid">
          <div class="tile">
            <img src="../../Team Image Library/Hyderabad Collective Images /Apiculture flora planation 3.png" alt="Flora" />
          </div>
          <div class="tile">
            <video src="../../Team Image Library/Hyderabad Collective Images /Bio Inputs 2.mp4" autoplay muted loop playsinline></video>
          </div>
          <div class="tile">
            <img src="../../Team Image Library/Hyderabad Collective Images /Volunteering  3.png" alt="Volunteering" />
          </div>
          <div class="tile">
            <img src="../../Team Image Library/Hyderabad Collective Images /Weeding 2.png" alt="Weeding" />
          </div>
          <div class="tile">
            <img src="../../Team Image Library/Hyderabad Collective Images /Soil filling 1.png" alt="Soil" />
          </div>
          <div class="tile">
            <img src="../../Team Image Library/Hyderabad Collective Images /Pigeon pea winnowing and cleaning.png" alt="Pigeon pea" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
